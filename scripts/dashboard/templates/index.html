<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inflow Operations | Job Board</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
        }

        .card {
            background-color: #1e293b;
            border: 1px solid #334155;
            border-radius: 0.75rem;
            padding: 1.5rem;
        }

        .stat-value {
            font-size: 2.25rem;
            font-weight: 700;
            color: #38bdf8;
        }

        .stat-label {
            font-size: 0.875rem;
            color: #94a3b8;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
    </style>
</head>

<body class="p-8">
    <div class="max-w-7xl mx-auto space-y-8">
        <!-- Header -->
        <div class="flex justify-between items-center">
            <div>
                <h1
                    class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-emerald-400">
                    Inflow Operations Center
                </h1>
                <p class="text-slate-400 mt-1">Real-time Ingestion & Discovery Monitoring</p>
            </div>
            <div class="flex items-center space-x-2">
                <span class="relative flex h-3 w-3">
                    <span
                        class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-3 w-3 bg-emerald-500"></span>
                </span>
                <span class="text-sm font-medium text-emerald-400">System Active</span>
            </div>
        </div>

        <!-- KPI Grid -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
            <div class="card">
                <div class="stat-label">Total Jobs Inducted</div>
                <div class="stat-value" id="stat-total-jobs">-</div>
            </div>
            <div class="card">
                <div class="stat-label">Active Endpoints</div>
                <div class="stat-value text-emerald-400" id="stat-active-endpoints">-</div>
            </div>
            <div class="card">
                <div class="stat-label">New ATS Found (24h)</div>
                <div class="stat-value text-purple-400" id="stat-new-endpoints">-</div>
            </div>
            <div class="card">
                <div class="stat-label">Volume (Today)</div>
                <div class="stat-value text-amber-400" id="stat-volume-today">-</div>
            </div>
        </div>

        <!-- Main Charts Area -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Ingestion Velocity -->
            <div class="card lg:col-span-2">
                <div class="flex justify-between mb-4">
                    <h3 class="text-lg font-semibold">Ingestion Velocity (Last 24h)</h3>
                </div>
                <div class="h-64">
                    <canvas id="chart-ingestion"></canvas>
                </div>
            </div>

            <!-- ATS Share -->
            <div class="card">
                <h3 class="text-lg font-semibold mb-4">Source Distribution</h3>
                <div class="h-64 flex justify-center">
                    <canvas id="chart-ats"></canvas>
                </div>
            </div>
        </div>

        <!-- Live Discoveries Feed -->
        <div class="card">
            <h3 class="text-lg font-semibold mb-4">Latest Discoveries</h3>
            <div class="overflow-x-auto">
                <table class="w-full text-sm text-left text-slate-400">
                    <thead class="text-xs text-slate-200 uppercase bg-slate-700/50">
                        <tr>
                            <th class="px-4 py-3">ATS Provider</th>
                            <th class="px-4 py-3">Slug / Name</th>
                            <th class="px-4 py-3">Endpoint URL</th>
                            <th class="px-4 py-3">Discovered At</th>
                        </tr>
                    </thead>
                    <tbody id="table-discoveries" class="divide-y divide-slate-700">
                        <!-- Rows injected here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api/stats';

        async function fetchData() {
            // Summary
            const summary = await fetch(`${API_BASE}/summary`).then(r => r.json());
            document.getElementById('stat-total-jobs').innerText = summary.total_jobs.toLocaleString();
            document.getElementById('stat-active-endpoints').innerText = summary.active_endpoints.toLocaleString();
            document.getElementById('stat-new-endpoints').innerText = summary.new_endpoints_today.toLocaleString();
            document.getElementById('stat-volume-today').innerText = summary.jobs_ingested_today.toLocaleString();

            // Recent Discoveries
            const discoveries = await fetch(`${API_BASE}/recent_discoveries`).then(r => r.json());
            const tbody = document.getElementById('table-discoveries');
            tbody.innerHTML = discoveries.map(d => `
                <tr class="hover:bg-slate-800 transition-colors">
                    <td class="px-4 py-3 font-medium text-white">${d.provider}</td>
                    <td class="px-4 py-3">${d.slug || '-'}</td>
                    <td class="px-4 py-3 text-blue-400 truncate max-w-xs">${d.url}</td>
                    <td class="px-4 py-3">${new Date(d.discovered).toLocaleTimeString()}</td>
                </tr>
            `).join('');

            // Charts
            updateCharts();
        }

        let ingestionChart = null;
        let atsChart = null;

        async function updateCharts() {
            // Ingestion
            const hist = await fetch(`${API_BASE}/ingestion_history`).then(r => r.json());
            const ctx1 = document.getElementById('chart-ingestion').getContext('2d');

            if (ingestionChart) ingestionChart.destroy();
            ingestionChart = new Chart(ctx1, {
                type: 'line',
                data: {
                    labels: hist.labels,
                    datasets: [{
                        label: 'Jobs Fetched',
                        data: hist.data,
                        borderColor: '#38bdf8',
                        backgroundColor: 'rgba(56, 189, 248, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { y: { grid: { color: '#334155' } }, x: { grid: { display: false } } }
                }
            });

            // ATS
            const dist = await fetch(`${API_BASE}/ats_distribution`).then(r => r.json());
            const ctx2 = document.getElementById('chart-ats').getContext('2d');

            if (atsChart) atsChart.destroy();
            atsChart = new Chart(ctx2, {
                type: 'doughnut',
                data: {
                    labels: dist.map(d => d.name),
                    datasets: [{
                        data: dist.map(d => d.value),
                        backgroundColor: [
                            '#38bdf8', '#34d399', '#a78bfa', '#fbbf24', '#f472b6',
                            '#64748b', '#94a3b8', '#cbd5e1'
                        ],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { position: 'right', labels: { color: '#cbd5e1' } } }
                }
            });
        }

        // Init
        fetchData();
        // Refresh every 30s
        setInterval(fetchData, 30000);
    </script>
</body>

</html>
