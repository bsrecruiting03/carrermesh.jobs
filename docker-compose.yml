services:
  # Database Layer
  postgres:
    image: pgvector/pgvector:pg15
    container_name: job_board_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: job_board
    ports:
      - "5433:5432" # Exposed on 5433 to avoid conflict with local postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    shm_size: 2gb
    restart: always

  # Queue Layer
  redis:
    image: redis:7-alpine
    container_name: job_board_redis
    ports:
      - "6379:6379"
    restart: always

  # Search Engine
  meilisearch:
    image: getmeili/meilisearch:v1.3
    container_name: job_board_search
    environment:
      - MEILI_MASTER_KEY=masterKey
    ports:
      - "7700:7700"
    volumes:
      - meili_data:/meili_data
    restart: always

  # Worker Nodes (Scale with --scale worker=5)
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    image: job_board_worker
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/job_board
      - REDIS_URL=redis://redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      - postgres
      - redis
    deploy:
      replicas: 1
    restart: on-failure

  worker-enrichment:
    build:
      context: .
      dockerfile: Dockerfile.worker
    image: job_board_worker_enrichment
    command: [ "python", "us_ats_jobs/worker_enrichment.py" ]
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/job_board
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GEMINI_API_KEYS=${GEMINI_API_KEYS}
      - LLM_PROVIDER=gemini
      - LLM_MODEL=gemini-flash-latest
      - PYTHONPATH=/app
    volumes:
      - .:/app
    depends_on:
      - postgres
    deploy:
      replicas: 1
    restart: on-failure

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile.worker
    image: job_board_scheduler
    command: [ "python", "scripts/run_scheduler.py" ]
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/job_board
      - REDIS_URL=redis://redis:6379/0
      - MEILI_URL=http://meilisearch:7700
      - MEILI_MASTER_KEY=masterKey
    depends_on:
      - postgres
      - redis
      - meilisearch
    restart: always

  api:
    build:
      context: .
      dockerfile: Dockerfile.worker
    image: job_board_api
    command: [ "uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8000" ]
    expose:
      - 8000
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/job_board
      - REDIS_URL=redis://redis:6379/0
      - MEILI_MASTER_KEY=masterKey
      - MEILI_URL=http://meilisearch:7700
      - PYTHONPATH=/app
    depends_on:
      - postgres
      - redis
      - meilisearch
    restart: always

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - job-board-network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - job-board-network
    depends_on:
      - prometheus

networks:
  job-board-network:
    driver: bridge

volumes:
  postgres_data:
  meili_data:
